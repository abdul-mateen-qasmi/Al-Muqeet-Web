<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al Muqeet Technical Services LLC — Control Room</title>
  <meta name="robots" content="noindex, nofollow" />
  <script>
    // Redirect to hash-based admin route
    window.location.replace("/#/admin");
  </script>
  <style>
    body { background: #F4F5F7; display: grid; place-items: center; min-height: 100vh; margin: 0; font-family: system-ui, sans-serif; }
    .loader { text-align: center; color: #3A3D42; }
    .loader span { display: inline-block; width: 12px; height: 12px; border-radius: 999px; background: #C8A24A; animation: pulse 1.4s ease-in-out infinite; }
    .loader span:nth-child(2) { animation-delay: 0.2s; }
    .loader span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
  </style>
</head>
<body>
  <div class="loader">
    <div style="margin-bottom:1rem"><span></span><span></span><span></span></div>
    <div style="font-size:14px;letter-spacing:0.15em;text-transform:uppercase;color:#6B7280">Redirecting to Control Room...</div>
  </div>
  <noscript>
    <meta http-equiv="refresh" content="0;url=/#/admin" />
    <p><a href="/#/admin">Continue to Admin →</a></p>
  </noscript>
</body>
</html>
